<!-- tic.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe — Player vs Anirudh</title>
    <link rel="stylesheet" href="tac.css">
</head>
<body>
    <div class="container">
        <!-- Title -->
        <h1 class="title">
            <span class="accent-x">You</span>
            <span class="vs">vs</span>
            <span class="accent-o">Anirudh</span>
        </h1>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-card player-score">
                <div class="score-label">You (X)</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-card draw-score">
                <div class="score-label">Draws</div>
                <div class="score-value" id="drawScore">0</div>
            </div>
            <div class="score-card ai-score">
                <div class="score-label">Anirudh (O)</div>
                <div class="score-value" id="aiScore">0</div>
            </div>
        </div>

        <!-- Status -->
        <div class="status player-turn" id="status">Your Turn</div>

        <!-- Board -->
        <div class="board-wrapper">
            <div class="board" id="board">
                <div class="cell" data-index="0" aria-label="Cell 1"></div>
                <div class="cell" data-index="1" aria-label="Cell 2"></div>
                <div class="cell" data-index="2" aria-label="Cell 3"></div>
                <div class="cell" data-index="3" aria-label="Cell 4"></div>
                <div class="cell" data-index="4" aria-label="Cell 5"></div>
                <div class="cell" data-index="5" aria-label="Cell 6"></div>
                <div class="cell" data-index="6" aria-label="Cell 7"></div>
                <div class="cell" data-index="7" aria-label="Cell 8"></div>
                <div class="cell" data-index="8" aria-label="Cell 9"></div>
            </div>
        </div>

        <!-- Restart Button -->
        <button class="restart-btn" id="restartBtn" aria-label="Restart game">
            <span class="restart-icon">↻</span> Restart Game
        </button>

        <span class="footer-note">Click a cell to place your X</span>
    </div>

    <script src="toe.js"></script>
</body>
</html>
